name: Build Android APK

# APK'ni bulutда (Android Studio'siz) yig'adi. Ishga tushirish:
#  GitHub'da: Actions tab -> "Build Android APK" -> "Run workflow"
# Tayyor bo'lgach: o'sha ishning pastidan "TayyorPrava-apk" ni yuklab oling.
on:
  workflow_dispatch:
    inputs:
      api_url:
        description: "Backend API manzili (masalan https://api.SIZNING-DOMEN.uz/api)"
        required: true
        default: "https://api.tayyorprava.uz/api"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      - name: Saytni build qilish (PWA)
        working-directory: frontend
        env:
          VITE_API_URL: ${{ github.event.inputs.api_url }}
        run: |
          npm install
          npm install @capacitor/core
          npm install -D @capacitor/cli @capacitor/android
          npm run build

      - name: Android loyihasi + sync
        working-directory: frontend
        run: |
          npx cap add android || true
          npx cap sync android

      - name: APK yig'ish
        working-directory: frontend/android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - name: APK ni yuklab olishga tayyorlash
        uses: actions/upload-artifact@v4
        with:
          name: TayyorPrava-apk
          path: frontend/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
