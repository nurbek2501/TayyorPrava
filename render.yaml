# Prava Pro (TayyorPrava) — Render Blueprint
# Render dashboard'da: New + -> Blueprint -> shu reponi tanlang.
# Backend (FastAPI, Docker) + Frontend (Vite static) bir blueprint'da.
#
# ✅ Ma'lumotlar bazasi: PostgreSQL (doimiy).
#   Birinchi deploy'da backend bo'sh Postgres'ni image ichidagi app.db'dan avtomatik
#   to'ldiradi (app/db/bootstrap.py) — admin, savollar, mavzular, promokodlar hammasi ko'chadi.
#   Keyin butun ma'lumot Postgres'da doimiy saqlanadi (restart/redeploy'da yo'qolmaydi).

databases:
  - name: tayyorprava-db
    plan: free
    # Render'ning free Postgres'i ~90 kundan keyin muddati tugaydi — production uchun
    # to'lovli plan (starter+) tavsiya etiladi.
    databaseName: tayyorprava
    user: tayyorprava

services:
  # ---- Backend API (FastAPI, Docker) ----
  - type: web
    name: tayyorprava-api
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    # Render $PORT beradi — Dockerfile'dagi qat'iy 8000 o'rniga shuni ishlatamiz.
    dockerCommand: sh -c "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: DEBUG
        value: "False"
      # Kuchli tasodifiy SECRET_KEY — Render generatsiya qiladi (JWT imzosi uchun).
      - key: SECRET_KEY
        generateValue: true
      # PostgreSQL — Render bazasidan avtomatik olinadi. Ilova `postgres://` ni
      # `postgresql+asyncpg://` ga o'zi normallashtiradi (config.py).
      - key: DATABASE_URL
        fromDatabase:
          name: tayyorprava-db
          property: connectionString
      # Frontend static site URL'i (pastdagi xizmat nomiga mos).
      - key: CORS_ORIGINS
        value: https://tayyorprava-web.onrender.com
      - key: RATE_LIMIT_ENABLED
        value: "True"
      # Telegram bot bilan umumiy maxfiy kalit — Render generatsiya qiladi.
      # Bot xizmati buni fromService orqali AVTOMATIK oladi (qo'lda kiritish shart emas).
      - key: BOT_SHARED_SECRET
        generateValue: true

  # ---- Telegram bot (aiogram, Docker worker) ----
  - type: worker
    name: tayyorprava-bot
    runtime: docker
    rootDir: telegram_bot
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    envVars:
      # ⚠️ MAXFIY — @BotFather'dan olgan tokenni Render dashboard'da qo'lda kiriting.
      #   (Ochiq ko'rilgan bo'lsa avval /revoke qilib yangisini oling.)
      - key: BOT_TOKEN
        sync: false
      # Backend API manzili (ichki xizmatga so'rov — /bot/issue-code).
      - key: BACKEND_URL
        value: https://tayyorprava-api.onrender.com/api
      # Umumiy maxfiy kalitni backend xizmatidan aynan olib keladi — mos bo'lishi kafolatlanadi.
      - key: BOT_SHARED_SECRET
        fromService:
          type: web
          name: tayyorprava-api
          envVarKey: BOT_SHARED_SECRET
      - key: TELEGRAM_CHANNEL
        value: "@TayyorPrava"
      - key: CHANNEL_URL
        value: https://t.me/TayyorPrava

  # ---- Frontend (Vite static site) ----
  - type: web
    name: tayyorprava-web
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://tayyorprava-api.onrender.com/api
    routes:
      # SPA — barcha yo'llar index.html'ga (React Router uchun).
      - type: rewrite
        source: /*
        destination: /index.html
